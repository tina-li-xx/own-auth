name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: own_auth_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d own_auth_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/own_auth_test
      OWN_AUTH_REQUIRE_POSTGRES: "true"
      OWN_AUTH_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/own_auth_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated package documentation
        run: pnpm docs:check

      - name: Build
        run: pnpm build

      - name: Check lazy Postgres loading
        run: pnpm postgres-loading:check

      - name: Check Cloudflare Workers bundle
        run: pnpm cloudflare:check

      - name: Test
        run: pnpm test
